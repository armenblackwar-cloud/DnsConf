name: Java CI Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Добавляем переменную окружения глобально для всего workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build project
      run: ./gradlew build
